[advisories]
# sqlx-macros-core resolves all database backends for compile-time macros, but
# Collab enables PostgreSQL only. The vulnerable RSA implementation is reachable
# solely through sqlx-mysql and is not compiled into collab-server. No fixed rsa
# release is currently available for RUSTSEC-2023-0071.
#
# quick-xml is pulled in transitively only through `plist`, which Tauri uses for
# macOS Info.plist parsing/bundling (and only on the macOS build target).
# RUSTSEC-2026-0194 (quadratic-time duplicate-attribute parsing) and
# RUSTSEC-2026-0195 (unbounded namespace-declaration allocation) are both
# DoS advisories triggered when parsing attacker-controlled XML; Collab never
# feeds untrusted input through plist/quick-xml. Both are fixed in
# quick-xml >=0.41.0, but `plist` (latest 1.9.0) still caps quick-xml at ^0.39,
# so there is no upstream path to upgrade yet. Remove these ignores once Tauri's
# `plist` dependency adopts quick-xml >=0.41.0.
ignore = ["RUSTSEC-2023-0071", "RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]

