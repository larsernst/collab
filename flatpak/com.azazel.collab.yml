id: com.azazel.collab
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
command: collab
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
  build-args:
    # Build-time dependency resolution also needs network access; runtime
    # server connectivity is granted separately through finish-args above.
    - --share=network
  env:
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
modules:
  - name: collab
    buildsystem: simple
    build-commands:
      - ./flatpak/build-in-flatpak.sh
    sources:
      - type: dir
        path: ..
