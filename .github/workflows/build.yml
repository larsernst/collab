name: Build

# Triggers:
#   - Push a tag like v1.2.3  → builds all targets and creates a GitHub Release
#   - workflow_dispatch       → manual run from the Actions tab (no release created)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write   # required to create GitHub Releases
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ─────────────────────────────────────────────────
          - platform:       ubuntu-22.04
            rust-target:    x86_64-unknown-linux-gnu
            artifact-label: linux-x86_64

          # ── Linux aarch64 ────────────────────────────────────────────────
          # ubuntu-24.04-arm is GitHub's native ARM64 runner (free for public repos)
          - platform:       ubuntu-24.04-arm
            rust-target:    aarch64-unknown-linux-gnu
            artifact-label: linux-aarch64

          # ── Windows x86_64 ───────────────────────────────────────────────
          - platform:       windows-latest
            rust-target:    x86_64-pc-windows-msvc
            artifact-label: windows-x86_64

          # ── macOS Apple Silicon ──────────────────────────────────────────
          - platform:       macos-latest   # macos-14+ = M1 runner
            rust-target:    aarch64-apple-darwin
            artifact-label: mac-apple-silicon

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.artifact-label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / pnpm ───────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # The repo root is now a Cargo workspace; Cargo.lock and the shared
          # target/ directory live here, not under src-tauri.
          workspaces: .

      # ── Linux system dependencies ─────────────────────────────────────────
      # Required by WebKitGTK / Tauri on Linux (same packages for x86 and arm)
      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── Tauri build ───────────────────────────────────────────────────────
      # TAURI_SIGNING_PRIVATE_KEY is required by tauri-plugin-updater to sign
      # each bundle. The .sig files it produces are uploaded alongside installers
      # and referenced in latest.json so the in-app updater can verify downloads.
      - name: Build
        run: pnpm tauri build --target ${{ matrix.rust-target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package portable Linux archive
        if: contains(matrix.platform, 'ubuntu')
        run: |
          mkdir -p dist-portable
          cp target/${{ matrix.rust-target }}/release/collab dist-portable/collab
          cat > dist-portable/README.txt <<'EOF'
          collab portable Linux build

          This archive runs against the host system WebKitGTK/GTK libraries. Use it when
          the .deb / .rpm packages or the Flatpak bundle are not practical on your distro.

          Run:
            ./collab
          
          Requirements:
            Install the normal Tauri/WebKitGTK runtime packages for your distro.
          EOF
          tar -C dist-portable -czf collab-${{ matrix.artifact-label }}-portable.tar.gz .

      # ── Publish GitHub Release (tag pushes only) ───────────────────────────
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft:      true
          prerelease: false
          name:       'collab ${{ github.ref_name }}'
          body: |
            Linux download order:
            1. Use the `.deb` build on Debian/Ubuntu-based systems.
            2. Use the `.rpm` build on Fedora/openSUSE/RHEL-based systems.
            3. Use the Flatpak bundle (`collab-flatpak-x86_64.flatpak`) or `collab-linux-*-portable.tar.gz` on other desktop distros.

            Native packages, the Flatpak bundle, and the portable tarball provide the best touchpad scrolling, blur/compositing, and scaling behavior on Linux.

            Linux install guide: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/linux-install.md
          files: |
            target/${{ matrix.rust-target }}/release/bundle/**/*.deb
            target/${{ matrix.rust-target }}/release/bundle/**/*.deb.sig
            target/${{ matrix.rust-target }}/release/bundle/**/*.rpm
            target/${{ matrix.rust-target }}/release/bundle/**/*.rpm.sig
            target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            target/${{ matrix.rust-target }}/release/bundle/**/*.msi.sig
            target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            target/${{ matrix.rust-target }}/release/bundle/**/*.exe.sig
            target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz
            target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz.sig
            collab-${{ matrix.artifact-label }}-portable.tar.gz

      # ── Collect artifacts (all runs) ───────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-label }}
          if-no-files-found: warn
          path: |
            target/${{ matrix.rust-target }}/release/bundle/**/*.deb
            target/${{ matrix.rust-target }}/release/bundle/**/*.deb.sig
            target/${{ matrix.rust-target }}/release/bundle/**/*.rpm
            target/${{ matrix.rust-target }}/release/bundle/**/*.rpm.sig
            target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            target/${{ matrix.rust-target }}/release/bundle/**/*.msi.sig
            target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            target/${{ matrix.rust-target }}/release/bundle/**/*.exe.sig
            target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz
            target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz.sig
            collab-${{ matrix.artifact-label }}-portable.tar.gz

  flatpak:
    name: flatpak-x86_64
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install runtimes and SDK extensions
        run: |
          flatpak install --user -y flathub \
            org.gnome.Platform//48 \
            org.gnome.Sdk//48 \
            org.freedesktop.Sdk.Extension.node20//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build Flatpak repo
        run: |
          flatpak-builder --user --install-deps-from=flathub --force-clean flatpak-build flatpak/com.azazel.collab.yml
          flatpak-builder --repo=flatpak-repo --force-clean flatpak-build flatpak/com.azazel.collab.yml

      - name: Bundle Flatpak
        run: |
          flatpak build-bundle flatpak-repo collab-flatpak-x86_64.flatpak com.azazel.collab --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-x86_64
          if-no-files-found: error
          path: |
            collab-flatpak-x86_64.flatpak
            flatpak/com.azazel.collab.yml
            flatpak/com.azazel.collab.desktop
            flatpak/com.azazel.collab.metainfo.xml

      - name: Release Flatpak bundle
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: |
            collab-flatpak-x86_64.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update manifest ─────────────────────────────────────────────────────────
  # Runs after all matrix builds finish. Downloads their artifacts, generates
  # latest.json (required by tauri-plugin-updater), and uploads it to the release.
  publish:
    name: Publish update manifest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json
        run: |
          cat > gen_manifest.mjs << 'SCRIPT'
          import fs   from 'fs';
          import path from 'path';

          const tag     = process.env.TAG;
          const version = tag.replace(/^v/, '');
          const repo    = process.env.GITHUB_REPOSITORY;
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;

          // Find the first file under `dir` whose name matches `pattern`.
          function findFile(dir, pattern) {
            if (!fs.existsSync(dir)) return null;
            for (const rel of fs.readdirSync(dir, { recursive: true })) {
              if (pattern.test(String(rel))) return path.join(dir, String(rel));
            }
            return null;
          }

          // artifact-label → Tauri platform key + file patterns.
          // Linux is intentionally omitted: the in-app updater's only Linux target
          // was the AppImage, which is no longer built. Linux updates are handled by
          // the system package manager (.deb/.rpm) or Flathub (Flatpak).
          const PLATFORMS = {
            'windows-x86_64':{ artifact: 'windows-x86_64',   file: /-setup\.exe$|\.msi$/, sig: /-setup\.exe\.sig$|\.msi\.sig$/ },
            'darwin-aarch64':{ artifact: 'mac-apple-silicon', file: /\.app\.tar\.gz$/,     sig: /\.app\.tar\.gz\.sig$/ },
          };

          const manifest = {
            version,
            notes:    '',
            pub_date: new Date().toISOString(),
            platforms: {},
          };

          for (const [platform, cfg] of Object.entries(PLATFORMS)) {
            const dir       = path.join('artifacts', cfg.artifact);
            const installer = findFile(dir, cfg.file);
            const sigFile   = findFile(dir, cfg.sig);

            if (!installer) {
              console.warn(`Skipping ${platform}: installer not found under ${dir}`);
              continue;
            }
            if (!sigFile) {
              console.warn(`Skipping ${platform}: .sig file not found under ${dir} (installer: ${path.basename(installer)})`);
              continue;
            }

            manifest.platforms[platform] = {
              url:       `${baseUrl}/${path.basename(installer)}`,
              signature: fs.readFileSync(sigFile, 'utf8').trim(),
            };
            console.log(`  ${platform}: ${path.basename(installer)}`);
          }

          fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
          console.log('latest.json written.');
          SCRIPT
          node gen_manifest.mjs
        env:
          TAG: ${{ github.ref_name }}

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
