name: Server Container Build

on:
  push:
    tags:
      - 'server-v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            architecture: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            architecture: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: ${{ matrix.platform }}
          tags: collab-server:ci-${{ matrix.architecture }}
          outputs: type=oci,dest=/tmp/collab-server-${{ matrix.architecture }}.tar
          cache-from: type=gha,scope=server-${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=server-${{ matrix.architecture }}
        env:
          BUILDKIT_PROGRESS: plain

      - name: Upload OCI image
        uses: actions/upload-artifact@v4
        with:
          name: collab-server-${{ matrix.architecture }}
          path: /tmp/collab-server-${{ matrix.architecture }}.tar
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release:
    name: Prepare release image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.registry.outputs.image }}
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release version
        run: node scripts/check-release-version.mjs --target server "${{ github.ref_name }}"

      - name: Parse server version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#server-v}"
          major_minor="$(cut -d. -f1,2 <<< "$version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"

      - name: Set registry image name
        id: registry
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/collab-server" >> "$GITHUB_OUTPUT"

  publish-platform:
    name: Build and scan ${{ matrix.platform }}
    needs: release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            architecture: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            architecture: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image by digest
        id: platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.title=Collab Server
            org.opencontainers.image.description=Self-hosted collaboration server for Collab
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
          outputs: type=image,name=${{ needs.release.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=server-${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=server-${{ matrix.architecture }}
          provenance: mode=max
          sbom: true
        env:
          BUILDKIT_PROGRESS: plain

      - name: Install Trivy
        run: |
          ./scripts/install-trivy.sh "$RUNNER_TEMP/trivy-bin"
          echo "$RUNNER_TEMP/trivy-bin" >> "$GITHUB_PATH"

      - name: Scan platform image by digest
        run: |
          trivy image \
            --platform "${{ matrix.platform }}" \
            --severity HIGH,CRITICAL \
            --pkg-types os,library \
            --ignore-unfixed \
            --exit-code 1 \
            "${{ needs.release.outputs.image }}@${{ steps.platform.outputs.digest }}"

      - name: Export platform digest
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest='${{ steps.platform.outputs.digest }}'
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload platform digest
        uses: actions/upload-artifact@v4
        with:
          name: collab-server-digest-${{ matrix.architecture }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    name: Publish multi-platform manifest
    needs: [release, publish-platform]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download platform digests
        uses: actions/download-artifact@v4
        with:
          pattern: collab-server-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release tags
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release.outputs.image }}
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.major_minor }}
            type=raw,value=latest,enable=${{ !contains(needs.release.outputs.version, '-') }}

      - name: Create multi-platform manifest
        working-directory: /tmp/digests
        env:
          REGISTRY_IMAGE: ${{ needs.release.outputs.image }}
        run: |
          tags="$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          sources="$(printf "${REGISTRY_IMAGE}@sha256:%s " *)"
          docker buildx imagetools create $tags $sources

      - name: Inspect published image
        run: docker buildx imagetools inspect "${{ needs.release.outputs.image }}:${{ needs.release.outputs.version }}"

      - name: Publish summary
        shell: bash
        run: |
          {
            echo '## Collab Server image'
            echo
            echo '```text'
            echo '${{ steps.metadata.outputs.tags }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
