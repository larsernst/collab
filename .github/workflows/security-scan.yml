name: Security Scan

on:
  push:
  workflow_dispatch:

jobs:
  dependencies:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit JavaScript dependencies
        run: pnpm audit --audit-level high

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit

  container:
    name: Container vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          tags: collab-server:security-scan
          outputs: type=docker,dest=/tmp/collab-server-security-scan.tar
          cache-from: type=gha,scope=server-security-scan
          cache-to: type=gha,mode=max,scope=server-security-scan

      - name: Verify server image archive
        run: test -s /tmp/collab-server-security-scan.tar

      - name: Install Trivy
        run: |
          ./scripts/install-trivy.sh "$RUNNER_TEMP/trivy-bin"
          echo "$RUNNER_TEMP/trivy-bin" >> "$GITHUB_PATH"

      - name: Scan server image
        run: |
          trivy image \
            --input /tmp/collab-server-security-scan.tar \
            --format table \
            --severity HIGH,CRITICAL \
            --pkg-types os,library \
            --ignore-unfixed \
            --exit-code 1
