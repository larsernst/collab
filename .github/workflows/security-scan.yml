name: Security Scan

on:
  push:
  workflow_dispatch:

jobs:
  dependencies:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit JavaScript dependencies
        run: pnpm audit --audit-level high

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  container:
    name: Container vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          tags: collab-server:security-scan
          outputs: type=docker,dest=/tmp/collab-server-security-scan.tar
          cache-from: type=gha,scope=server-security-scan
          cache-to: type=gha,mode=max,scope=server-security-scan

      - name: Verify server image archive
        run: test -s /tmp/collab-server-security-scan.tar

      - name: Scan server image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: image
          input: /tmp/collab-server-security-scan.tar
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
